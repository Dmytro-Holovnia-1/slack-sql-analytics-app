---
display_information:
  name: rounds-sql-chatbot
features:
  bot_user:
    display_name: rounds-sql-chatbot
    always_online: true
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - assistant:write
      - chat:write
      - files:write
      - im:history
      - im:read
      - im:write
      - channels:read
settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.im
  interactivity:
    is_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
